# SDD Configuration for aerospace-skills repository
# This file configures the Spec-Driven Development workflow

project:
  name: aerospace-skills
  description: Repository for aerospace-related skills, starting with amateur-rocketry
  version: "1.0.0"

sdd:
  mode: hybrid  # openspec + engram
  artifact_store:
    enabled: true
    backend: both  # openspec files + engram copy
  strict_tdd: false  # No test runner for skill documentation
  auto_archive: true

git:
  auto_branch: true
  squash_merge: true
  require_review: true

notifications:
  on_phase_complete: true
  on_pr_ready: true

# Skills configuration
skills:
  directory: skills
  auto_discover: true
  registry_path: .atl/skill-registry.md

# File patterns to ignore in SDD processing
ignore_patterns:
  - "**/.git/**"
  - "**/node_modules/**"
  - "**/__pycache__/**"
  - "**/*.log"
  - "**/.DS_Store"